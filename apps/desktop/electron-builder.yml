appId: com.shortdrama.desktop
productName: Short Drama Studio
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - assets/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: public.app-category.entertainment
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icon.png
  category: Entertainment
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: generic
  url: https://releases.shortdrama.app
  channel: latest
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
